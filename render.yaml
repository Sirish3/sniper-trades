services:
  - type: web
    name: sniper-trades-scheduler
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter # free tier spins down on idle, which breaks the 10/2/3:50 scheduler
    healthCheckPath: /health
    envVars:
      - key: PORTFOLIO_SIZE
        value: 100000
      - key: DATABASE_URL
        sync: false # set to a persistent Postgres URL (e.g. Neon/Supabase) if not using a Render disk
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false

  # Combined Scanner + Screener API — backs both the React "Scanner" tab
  # (swing_scanner: Trend Template + VCP) and "Screener" tab (stock_screener:
  # S&P 500 / Nasdaq 100 / custom list). Only one free web service slot was
  # available beyond the paid scheduler above, so both run as their own
  # subprocesses behind combined_service/proxy.py rather than as two
  # separate Render services — see that file for why (module-name
  # collisions if imported into one process instead). `name` matches the
  # already-existing manually-created service (sniper-trades.onrender.com)
  # so this Blueprint adopts it instead of creating a new one.
  #
  # No `rootDir` here on purpose: the Dockerfile COPYs from swing_scanner/,
  # stock_screener/, and combined_service/ as siblings, so the build
  # context must stay the repo root.
  - type: web
    name: sniper-trades
    runtime: docker
    dockerfilePath: ./combined_service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ALPACA_KEY_ID
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_URL
        value: https://data.alpaca.markets/v2/stocks
      - key: FINNHUB_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false # same Neon instance as sniper-trades-scheduler
